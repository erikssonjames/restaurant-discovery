name: Publish images

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      component:
        description: Image to publish
        type: choice
        required: true
        default: all
        options:
          - all
          - frontend
          - cms

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: erikssonjames

jobs:
  prepare:
    name: Prepare image tag
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Create image tag
        id: tag
        shell: bash
        run: |
          echo "image_tag=${GITHUB_REF_NAME}-$(date +%s)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  publish-cms:
    name: Build and push CMS
    needs: prepare
    runs-on: ubuntu-latest

    if: >-
      github.event_name == 'push' ||
      inputs.component == 'all' ||
      inputs.component == 'cms'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push CMS
        uses: docker/build-push-action@v6
        with:
          context: ./cms
          file: ./cms/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/restaurant-discovery-cms:${{ needs.prepare.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/restaurant-discovery-cms:${{ github.ref_name }}
          cache-from: type=gha,scope=restaurant-discovery-cms
          cache-to: type=gha,mode=max,scope=restaurant-discovery-cms

  publish-frontend:
    name: Build and push frontend
    needs: prepare
    runs-on: ubuntu-latest

    if: >-
      vars.PRODUCTION_CMS_READY == 'true' &&
      (
        github.event_name == 'push' ||
        inputs.component == 'all' ||
        inputs.component == 'frontend'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://restaurants.jameseriksson.com
            NEXT_PUBLIC_STRAPI_URL=https://restaurants.jameseriksson.com
            STRAPI_API_URL=https://restaurants.jameseriksson.com
          secrets: |
            strapi_api_token=${{ secrets.STRAPI_API_TOKEN }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/restaurant-discovery-frontend:${{ needs.prepare.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/restaurant-discovery-frontend:${{ github.ref_name }}
          cache-from: type=gha,scope=restaurant-discovery-frontend
          cache-to: type=gha,mode=max,scope=restaurant-discovery-frontend